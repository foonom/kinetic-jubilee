name: MC Java Runner
on:
  workflow_dispatch:
  repository_dispatch:
    types: [restart_server]

jobs:
  run-server:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
      
      - name: Setup Environment & Catbox Script
        run: |
          sudo apt update
          sudo apt install -y zstd p7zip-full bc curl
          # Download and prepare the catbox interface script
          wget https://gist.github.com/MineBartekSA/1d42d6973ddafb82793fd49b4fb06591/raw/66073b9dc40a7c9e65ba470615071cf8f9f37809/catbox
          chmod +x catbox

      - name: Wait for Final Sync from Peer
        run: |
          if [ ! -f "catbox_links.txt" ]; then exit 0; fi
          TRIGGER_HASH=$(git rev-parse HEAD)
          for i in {1..15}; do
            git fetch origin main
            if [ "$TRIGGER_HASH" != "$(git rev-parse origin/main)" ]; then
              git pull origin main
              exit 0
            fi
            echo "Waiting for Runner #1... (Attempt $i/15)"
            sleep 2
          done

      - name: Restore & Decode Data
        run: |
          git pull origin main
          mkdir -p mc_data
          
          # Priority: Permanent Archive
          if [ -f "archived.txt" ] && grep -q "true" archived.txt; then
            URL=$(cat catbox_archive.txt | tr -d '[:space:]' | base64 -d)
            echo "Restoring from Archive: $URL"
            curl -L -f -o archive.7z "$URL"
            sudo 7z x archive.7z -o./
            echo "false" > archived.txt
            git config --global user.name "MC Backup Bot"
            git config --global user.email "actions@github.com"
            git add archived.txt
            git commit -m "Restored from archive [skip ci]" || echo "No changes"
            git push origin main
          
          # Fallback: Temporary Chunks
          elif [ -f "catbox_links.txt" ]; then
            sed -i '/^[[:space:]]*$/d' catbox_links.txt
            i=0
            while read -r line || [ -n "$line" ]; do
              clean_line=$(echo "$line" | tr -d '[:space:]')
              decoded=$(echo "$clean_line" | base64 -d)
              
              # Validate decoded string isn't an HTML error
              if [[ "$decoded" == *"<html"* ]]; then
                echo "Fatal: Link $i is corrupted HTML error page."
                exit 1
              fi

              echo "Downloading part $i..."
              curl -L -f -o "part_$i" "$decoded"
              ((i++))
            done < catbox_links.txt
            
            if ls part_* 1> /dev/null 2>&1; then
              cat $(ls -v part_*) > backup.tar.zst
              sudo tar --use-compress-program=zstd -xf backup.tar.zst -C ./
              rm -f part_* backup.tar.zst
            fi
          fi

      - name: Start Services
        env:
          PLAYIT_SECRET: ${{ secrets.PLAYIT_SECRET }}
          SERVER_OP: ${{ secrets.SERVER_OP }}
          RCON_PASSWD: ${{ secrets.RCON_PASSWD }}
        run: |
          echo "PLAYIT_SECRET=$PLAYIT_SECRET" > .env
          echo "SERVER_OP=$SERVER_OP" >> .env
          echo "RCON_PASSWD=$RCON_PASSWD" >> .env
          docker compose up -d
          docker compose logs mc-java --follow & 
          
      - name: Operational Loop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for i in {1..3}; do
            sleep 100
            echo "Creating mid-run backup..."
            docker pause mc-java
            sudo tar --use-compress-program="zstd -T0 -5" -cf - ./mc_data/* | split -b 990M - --numeric-suffixes=0 --elide-empty-files backup.tar.zst.
            docker unpause mc-java

            sudo chown runner:docker backup.tar.zst.*

            > new_links.txt
            for file in backup.tar.zst.*; do
              # Use the script for uploading (expires in 72h)
              LINK=$(curl -F "reqtype=fileupload" -F "time=72h" -F "fileToUpload=@$file" https://litterbox.catbox.moe/resources/internals/api.php)
              if [[ "$LINK" == http* ]]; then
                echo "$LINK" | base64 >> new_links.txt
              else
                echo "Upload failed for $file: $LINK"
                exit 1
              fi
            done
            
            mv new_links.txt catbox_links.txt
            git config --global user.name "MC Backup Bot"
            git config --global user.email "actions@github.com"
            git pull --rebase origin main
            git add catbox_links.txt
            git commit -am "Sync world cycle $i [skip ci]" || echo "No changes"
            git push origin main
            rm *zst*
          done
          curl -X POST -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type": "restart_server"}'

      - name: Graceful Shutdown
        run: |
          MAX_RETRIES=720
          COUNT=0
          PLAYER_COUNT=1
          while [ "$PLAYER_COUNT" -gt 0 ] && [ "$COUNT" -lt "$MAX_RETRIES" ]; do
            PLAYER_COUNT=$(timeout 10s docker exec mc-java rcon-cli list | grep -oP '(?<=there are )\d+' || echo 0)
            if [ "$PLAYER_COUNT" -gt 0 ]; then
              if [ $((COUNT % 12)) -eq 0 ]; then
                docker exec mc-java rcon-cli "say §6[Server] Migration pending. Waiting for log-off..."
              fi
              sleep 5
              ((COUNT++))
            fi
          done

          docker compose down
          sudo tar --use-compress-program="zstd -T0" -cf - ./mc_data/* | split -b 190M - backup.tar.zst.
          
          > new_links.txt
          for file in backup.tar.zst.*; do
            LINK=$(curl -F "reqtype=fileupload" -F "time=72h" -F "fileToUpload=@$file" https://litterbox.catbox.moe/resources/internals/api.php)
            if [[ "$LINK" == http* ]]; then
              echo "$LINK" | base64 >> new_links.txt
            else
              echo "Shutdown upload failed: $LINK"
              exit 1
            fi
          done
          
          mv new_links.txt catbox_links.txt
          git config --global user.name "MC Backup Bot"
          git config --global user.email "actions@github.com"
          git pull --rebase origin main
          git add catbox_links.txt
          git commit -am "Final sync [skip ci]" || echo "No changes"
          git push origin main

      - name: Final Log Capture
        if: always()
        run: docker compose logs mc-java > final_logs.txt
          
      - name: Upload Logs as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-debug-logs
          path: final_logs.txt