name: MC Java Runner
on:
  workflow_dispatch:
  repository_dispatch:
    types: [restart_server]

jobs:
  run-server:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # - name: Cleanup storage
      #   run: |
      #     sudo rm -rf /usr/lib/jvm
      #     sudo rm -rf /usr/share/dotnet
      #     sudo rm -rf /usr/share/swift
      #     sudo rm -rf /usr/local/.ghcup
      #     sudo rm -rf /usr/local/julia*
      #     sudo rm -rf /usr/local/lib/android
      #     sudo rm -rf /usr/local/share/chromium
      #     sudo rm -rf /opt/microsoft /opt/google
      #     sudo rm -rf /opt/az
      #     sudo rm -rf /opt/hostedtoolcache
      #     sudo rm -rf /opt/ghc
      #     sudo rm -rf "/usr/local/share/boost"
          
      #     docker system prune -af || true
      #     docker builder prune -af || true
      #     df -h

      - name: Checkout Repo
        uses: actions/checkout@v4
      
      - name: Wait for Final Sync from Peer
        run: |
          if [ ! -f "catbox_links.txt" ]; then exit 0; fi

          TRIGGER_HASH=$(git rev-parse HEAD)
          for i in {1..800}; do
            git fetch origin main
            if [ "$TRIGGER_HASH" != "$(git rev-parse origin/main)" ]; then
              git pull origin main
              exit 0
            fi
            echo "Waiting for Runner #1... (Attempt $i/15)"
            sleep 5
          done

      - name: Restore & Decode Data
        run: |
          if [ -f "catbox_links.txt" ]; then
            mkdir -p mc_data
            # Decode Base64 links and download
            while read -r line; do
              url=$(echo "$line" | base64 -d)
              curl -L "$url" -o "part_$(date +%s%N).7z"
            done < catbox_links.txt
            cat part_* > backup.7z && 7z x backup.7z -omc_data/ && rm part_* backup.7z
          fi

      - name: Start Services
        env:
          PLAYIT_SECRET: ${{ secrets.PLAYIT_SECRET }}
          SERVER_OP: ${{ secrets.SERVER_OP }}
          RCON_PASSWD: ${{ secrets.RCON_PASSWD }}
        run: |
          echo "PLAYIT_SECRET=$PLAYIT_SECRET" > .env
          echo "SERVER_OP=$SERVER_OP" >> .env
          echo "RCON_PASSWD=$RCON_PASSWD" >> .env
          docker compose up -d
          docker compose logs mc-java --follow & 
          
          sleep 100
          docker exec mc-java rcon-cli "op $SERVER_OP"
      - name: Verify Port Binding
        run: |
          echo "Checking if the ports are open on the runner..."
          sudo netstat -tulpn | grep 25565 || echo "PORT 25565 IS NOT ACTIVE"
          sudo netstat -tulpn | grep 25575 || echo "PORT 25575 IS NOT ACTIVE"
      - name: Main Loop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          docker compose logs mc-java --follow & 
          
          for i in {1..10}; do
            sleep 1000
            
            echo "Pausing for backup..."
            docker pause mc-java
            
            # Compress and split
            sudo 7z a -ssw -mx1 -v190m backup.7z ./mc_data/*
            sudo chown runner:docker backup.7z.*
            docker unpause mc-java
            
            > new_links.txt
            for file in backup.7z.*; do
              # Upload and Base64 encode the resulting URL
              LINK=$(curl -F "reqtype=fileupload" -F "fileToUpload=@$file" https://catbox.moe/user/api.php)
              echo "$LINK" | base64 >> new_links.txt
            done
            
            mv new_links.txt catbox_links.txt
            git config --global user.name "MC Backup Bot"
            git config --global user.email "actions@github.com"
            git add catbox_links.txt
            git commit -am "Sync world [skip ci]" || echo "No changes"
            git pull --rebase origin main
            git push origin main
            
            rm backup.7z.*
            echo "Backup complete. Server unpaused."
          done
          echo "Triggering next runner for handoff..."
          curl -X POST -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type": "restart_server"}'
      
      - name: Graceful Shutdown
        run: |
          # Wait to let the new runner take over
          MAX_RETRIES=720
          COUNT=0
          PLAYER_COUNT=1
          while [ "$PLAYER_COUNT" -gt 0 ] && [ "$COUNT" -lt "$MAX_RETRIES" ]; do
            PLAYER_COUNT=$(timeout 10s docker exec mc-java rcon-cli list | grep -oP '(?<=there are )\d+' || echo 0)
            if [ "$PLAYER_COUNT" -gt 0 ]; then
              if [ $((COUNT % 12)) -eq 0 ]; then
                docker exec mc-java rcon-cli "say §6[Server] Migration pending. Waiting for log-off..."
              fi
              sleep 5
              ((COUNT++))
            fi
          done

          echo "Shutting down..."
          docker compose down

          # Compress and split
          sudo 7z a -ssw -mx1 -v190m backup.7z ./mc_data/*
          sudo chown runner:docker backup.7z.*
          
          > new_links.txt
          for file in backup.7z.*; do
            # Upload and Base64 encode the resulting URL
            LINK=$(curl -F "reqtype=fileupload" -F "fileToUpload=@$file" https://catbox.moe/user/api.php)
            echo "$LINK" | base64 >> new_links.txt
          done
          
          mv new_links.txt catbox_links.txt
          git config --global user.name "MC Backup Bot"
          git config --global user.email "actions@github.com"
          git add catbox_links.txt
          git commit -am "Sync world [skip ci]" || echo "No changes"
          git pull --rebase origin main
          git push origin main

      
      - name: Final Log Capture
        if: always()
        run: |
          docker compose logs mc-java > final_logs.txt
          
      - name: Upload Logs as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-debug-logs
          path: final_logs.txt