name: MC Java Runner
on:
  workflow_dispatch:
  repository_dispatch:
    types: [restart_server]

jobs:
  run-server:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # - name: Cleanup storage
      #   run: |
      #     sudo rm -rf /usr/lib/jvm
      #     sudo rm -rf /usr/share/dotnet
      #     sudo rm -rf /usr/share/swift
      #     sudo rm -rf /usr/local/.ghcup
      #     sudo rm -rf /usr/local/julia*
      #     sudo rm -rf /usr/local/lib/android
      #     sudo rm -rf /usr/local/share/chromium
      #     sudo rm -rf /opt/microsoft /opt/google
      #     sudo rm -rf /opt/az
      #     sudo rm -rf /opt/hostedtoolcache
      #     sudo rm -rf /opt/ghc
      #     sudo rm -rf "/usr/local/share/boost"
          
      #     docker system prune -af || true
      #     docker builder prune -af || true
      #     df -h

      - name: Checkout Repo
        uses: actions/checkout@v4
      
      - name: Install packages
        run: |
          sudo apt update
          sudo apt install -y zstd p7zip-full bc

      - name: Wait for Final Sync from Peer
        run: |
          if [ ! -f "catbox_links.txt" ]; then
            exit 0
          fi

          echo "Starting wait loop for Final Sync..."
          # Get the commit hash that triggered THIS run
          TRIGGER_HASH=$(git rev-parse HEAD)
          
          # Poll for 60s max
          for i in {1..30}; do
            git fetch origin main
            LATEST_HASH=$(git rev-parse origin/main)
            
            if [ "$TRIGGER_HASH" != "$LATEST_HASH" ]; then
              echo "Newer commit detected ($LATEST_HASH). Proceeding with restore."
              git pull origin main
              exit 0
            fi
            
            echo "Waiting for Runner #1 to push final backup... (Attempt $i/15)"
            sleep 2
          done
          
          echo "No new commit found within 5 minutes. Proceeding with existing data."

      - name: Restore & Decode Data
        run: |
          git pull origin main
          mkdir -p mc_data
          
          if [ -f "archived.txt" ] && [ "$(cat archived.txt)" = "true" ]; then
            echo "Archived state detected. Downloading from Catbox..."
            URL=$(cat catbox_archive.txt | base64 -d)
            curl -L -o archive.7z "$URL"
            sudo 7z x archive.7z -o./
            # Reset archive status so next backup goes to Litterbox normally
            echo "false" > archived.txt
            git config --global user.name "MC Backup Bot"
            git config --global user.email "actions@github.com"
            git add archived.txt
            git commit -m "Restored from archive, resetting flag [skip ci]" || echo "No changes"
            git push origin main
          
          elif [ -f "catbox_links.txt" ]; then
            echo "No archive found. Downloading temporary Litterbox chunks..."
            while read -r line; do
              url=$(echo "$line" | base64 -d)
              curl -L -O -J "$url" 
            done < catbox_links.txt
            
            if ls backup.tar.zst.* 1> /dev/null 2>&1; then
              cat backup.tar.zst.* > backup.tar.zst
              sudo tar --use-compress-program=zstd -xf backup.tar.zst -C ./
            fi
            rm -f backup.tar.zst*
          fi

      - name: Cache Minecraft Assets
        uses: actions/cache@v4
        with:
          path: |
            mc_data/mods
            mc_data/libraries
            mc_data/versions
          key: mc-assets-${{ hashFiles('docker-compose.yml') }}
          restore-keys: |
            mc-assets-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Start Services
        env:
          PLAYIT_SECRET: ${{ secrets.PLAYIT_SECRET }}
          SERVER_OP: ${{ secrets.SERVER_OP }}
          RCON_PASSWD: ${{ secrets.RCON_PASSWD }}
        run: |
          echo "PLAYIT_SECRET=$PLAYIT_SECRET" > .env
          echo "SERVER_OP=$SERVER_OP" >> .env
          echo "RCON_PASSWD=$RCON_PASSWD" >> .env

          docker compose up -d
          docker compose logs mc-java --follow & 
          
          sleep 100

          docker exec mc-java rcon-cli "op $SERVER_OP"

      - name: Verify Port Binding
        run: |
          echo "Checking if the ports are open on the runner..."
          sudo netstat -tulpn | grep 25565 || echo "PORT 25565 IS NOT ACTIVE"
          sudo netstat -tulpn | grep 25575 || echo "PORT 25575 IS NOT ACTIVE"

      - name: Operational Loop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          docker compose logs mc-java --follow & 
          # Run 3 cycles of 20 minutes = 60 minutes total
          for i in {1..12}; do
            sleep 1200
            
            echo "Pausing for backup..."
            docker pause mc-java
            
            # Compress and split
            #sudo 7z a -ssw -mx1 -v190m backup.7z ./mc_data/*
            sudo tar --use-compress-program="zstd -T0" -cf - ./mc_data/* | split -b 990M - backup.tar.zst.

            sudo chown runner:docker backup.7z.*
            
            > new_links.txt
            for file in backup.7z.*; do
              # Upload and Base64 encode the resulting URL
              #LINK=$(curl -F "reqtype=fileupload" -F "fileToUpload=@$file" https://catbox.moe/user/api.php)
              LINK=$(curl -F "reqtype=fileupload" -F "time=72h" -F "fileToUpload=@$file" https://litterbox.catbox.moe/resources/internals/api.php)
              echo "$LINK" | base64 >> new_links.txt
            done
            
            mv new_links.txt catbox_links.txt
            git config --global user.name "MC Backup Bot"
            git config --global user.email "actions@github.com"
            git add catbox_links.txt
            git commit -am "Sync world [skip ci]" || echo "No changes"
            git pull --rebase origin main
            git push origin main
            
            rm backup.7z.*
            docker unpause mc-java
            echo "Backup complete. Server unpaused."
            
            # On the final loop, trigger the next runner before finishing
            if [ $i -eq 3 ]; then
              echo "Triggering next runner for handoff..."
              curl -X POST -H "Authorization: token $GH_TOKEN" \
                -H "Accept: application/vnd.github.v3+json" \
                https://api.github.com/repos/${{ github.repository }}/dispatches \
                -d '{"event_type": "restart_server"}'
            fi
          done

      - name: Graceful Shutdown
        run: |
          # Check player count via RCON
          PLAYER_COUNT=$(timeout 30s docker exec mc-java rcon-cli list | grep -oP '(?<=there are )\d+' || echo 0)

          if [ "$PLAYER_COUNT" -gt "0" ]; then
            docker exec mc-java rcon-cli "say §6[Server] Migration in progress..."
            docker exec mc-java rcon-cli "say §eThe server will restart in 30 seconds to stay online."
            sleep 30
          fi

          MAX_RETRIES=720
          MAX_WAIT=$(echo "$MAX_RETRIES * 12" | bc)
          COUNT=0
          PLAYER_COUNT=1

          echo "Starting graceful shutdown check..."

          while [ "$PLAYER_COUNT" -gt 0 ] && [ "$COUNT" -lt "$MAX_RETRIES" ]; do
            PLAYER_COUNT=$(timeout 10s docker exec mc-java rcon-cli list | grep -oP '(?<=there are )\d+' || echo 0)
            
            if [ "$PLAYER_COUNT" -gt 0 ]; then
              # Only broadcast every 60 seconds (12 loops) to avoid spamming chat
              if [ $((COUNT % 12)) -eq 0 ]; then
                WAITED=$(echo "$COUNT / 12" | bc)
                docker exec mc-java rcon-cli "say §6[Server] Migration pending. §eWaiting for players to log off... Waited $WAITED/$MAX_WAIT minutes..."
                echo "Players still online ($PLAYER_COUNT). Waiting 5s... (Attempt $COUNT/$MAX_RETRIES)"
              fi
              sleep 5
              ((COUNT++))
            fi
          done

          if [ "$COUNT" -ge "$MAX_RETRIES" ]; then
            echo "Timeout reached. Proceeding with forced shutdown."
            docker exec mc-java rcon-cli "say §c[Server] Shutdown timeout reached. Saving world..."
          else
            echo "Server is empty. Proceeding with backup."
          fi
          
          docker compose down

          sudo 7z a -ssw -mx1 -v190m backup.7z ./mc_data/*

            sudo chown runner:docker backup.7z.*
            
            > new_links.txt
            for file in backup.7z.*; do
              # Upload and Base64 encode the resulting URL
              LINK=$(curl -F "reqtype=fileupload" -F "fileToUpload=@$file" https://catbox.moe/user/api.php)
              echo "$LINK" | base64 >> new_links.txt
            done
            
            mv new_links.txt catbox_links.txt
            git config --global user.name "MC Backup Bot"
            git config --global user.email "actions@github.com"
            git add catbox_links.txt
            git commit -am "Sync world [skip ci]" || echo "No changes"
            git pull --rebase origin main
            git push origin main
      
      - name: Final Log Capture
        if: always()
        run: |
          docker compose logs mc-java > final_logs.txt
          
      - name: Upload Logs as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-debug-logs
          path: final_logs.txt
